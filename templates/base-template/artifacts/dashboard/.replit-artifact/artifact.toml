kind = "web"
previewPath = "/"
title = "AgenticOS Template"
version = "1.0.0"
id = "artifacts/dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23987
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dashboard run dev"

[services.env]
PORT = "23987"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dashboard", "run", "build"]
publicDir = "artifacts/dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
